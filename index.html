                numberInput.focus();
                if (numberInput.value === '+51') numberInput.setSelectionRange(3, 3);
            }, 100);

            modal.querySelector('#whatsapp-cancel').addEventListener('click', function() { modal.remove(); });

            modal.querySelector('#whatsapp-send').addEventListener('click', function() {
                var number = numberInput.value.trim();
                if (!number || number === '+51' || number === '+') return alert('Ingresa un número de teléfono completo');
                
                localStorage.setItem('whatsapp_number', number);
                number = number.replace(/[\s\-\(\)]/g, '');
                if (!number.startsWith('+')) number = '+' + number;
                
                var message = '📋 *Mis Notas - Respaldo*\n\n📅 Fecha: ' + new Date().toLocaleString() + '\n📊 Total proyectos: ' + projects.length + '\n\n_Adjunto el archivo JSON para importar._';
                var fileName = 'MisNotas_Backup_' + Date.now() + '.json';
                var file = new File([blob], fileName, { type: 'application/json' });
                
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({ title: 'Mis Notas - Respaldo', text: message, files: [file] })
                        .then(function() { modal.remove(); })
                        .catch(function() { openWhatsAppFallback(number, message, blob, fileName); modal.remove(); });
                } else if (navigator.share) {
                    navigator.share({ title: 'Mis Notas - Respaldo', text: message })
                        .then(function() { modal.remove(); })
                        .catch(function() { openWhatsAppFallback(number, message, blob, fileName); modal.remove(); });
                } else {
                    openWhatsAppFallback(number, message, blob, fileName);
                    modal.remove();
                }
            });

            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
        }

        function openWhatsAppFallback(number, message, blob, fileName) {
            var whatsappUrl = 'https://wa.me/' + number.replace('+', '') + '?text=' + encodeURIComponent(message);
            var win = window.open(whatsappUrl, '_blank');
            setTimeout(function() { showWhatsAppInstructions(blob, fileName); }, 300);
            if (!win) { alert('Permite ventanas emergentes para abrir WhatsApp'); showWhatsAppInstructions(blob, fileName); }
        }

        function showWhatsAppInstructions(blob, fileName) {
            var modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = 
                '<div class="whatsapp-modal">' +
                    '<h3>📎 Adjuntar archivo en WhatsApp</h3>' +
                    '<p style="margin-bottom:12px;color:var(--text-secondary);font-size:0.9rem;">Para enviar el archivo JSON:</p>' +
                    '<div style="background:var(--bg);padding:12px;border-radius:8px;margin-bottom:12px;">' +
                        '<p style="font-weight:600;margin-bottom:4px;">Opción 1: Adjuntar manualmente</p>' +
                        '<p style="font-size:0.8rem;color:var(--text-secondary);">1. Descarga el archivo 👇<br>2. En WhatsApp, toca 📎<br>3. Selecciona "Documento"<br>4. Busca y envía el archivo</p>' +
                    '</div>' +
                    '<button class="btn btn-full" id="download-and-share" style="margin-bottom:8px;">💾 Descargar y compartir</button>' +
                    '<button class="btn btn-secondary btn-full" id="close-instructions">Cerrar</button>' +
                '</div>';
            document.body.appendChild(modal);

            modal.querySelector('#download-and-share').addEventListener('click', function() {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url; a.download = fileName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(function() {
                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, { type: 'application/json' })] })) {
                        navigator.share({ title: 'Mis Notas - Respaldo', files: [new File([blob], fileName, { type: 'application/json' })] }).catch(function() {});
                    }
                }, 500);
                modal.remove();
            });

            modal.querySelector('#close-instructions').addEventListener('click', function() { modal.remove(); });
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
        }

        // ============== INICIAR ==============
        initApp();
    </script>
</body>
</html>
